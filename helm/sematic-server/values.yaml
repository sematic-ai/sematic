auth:
  enabled: true
  google_oauth_client_id: xxxxxxxx.apps.googleusercontent.com # REPLACE ME
  authorized_email_domain: example.org # REPLACE ME

aws:
  enabled: true
  storage_bucket: my-s3-bucket # REPLACE ME

secret:
  create: true

database:
  url: postgres://postgresql:5432/postgres # REPLACE ME

deployment:
  replicaCount: 1
  affinity: {}
  annorations: {}
  tolerations: {}
  nodeSelector: {}
  securityContext: {}
    # fsGroup: 2000
  containerSecurityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000
  livenessProbe:
    failureThreshold: 6
    httpGet:
      path: /
      port: http
      scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 1
  readinessProbe:
    failureThreshold: 6
    httpGet:
      path: /
      port: http
      scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 1
  resources:
    limits:
      cpu: 500m
      memory: 4000Mi
    requests:
      cpu: 500m
      memory: 4000Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80


image:
  #repository: sematicai/sematic-server:v0.20.0
  pullPolicy: IfNotPresent
  #pullSecrets: []

rbac:
  create: true

serviceAccount:
  # Set to false and provide a name of an existing service account to reuse.
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  name: sematic-server

service:
  create: false
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
